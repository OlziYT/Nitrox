name: Build and Release Nitrox

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write        # nécessaire pour créer/modifier releases et artefacts
  packages: write        # si vous publiez des packages
  pull-requests: write   # pour interagir avec les PRs
  issues: write          # si besoin de créer des issues  

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0.4
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.4'

      - name: Restore dependencies           # ← Nouvelle étape
        run: dotnet restore                  # ← Exécute explicitement la restauration :contentReference[oaicite:3]{index=3}

      - name: Clean
        run: dotnet clean --configuration Release

      - name: Build (Release)
        run: dotnet build --no-restore -c Release   # plus besoin de restaurer ici :contentReference[oaicite:4]{index=4}

      - name: Publish self-contained
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -o out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nitrox-build
          path: out/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9.0.4
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.4'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nitrox-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nitrox ${{ github.ref_name }}
          files: out/**
          generate_release_notes: true
          body: |
            – **Build** : .NET SDK 9.0.4  
            – **Date** : ${{ github.event.head_commit.timestamp }}  
            – **Platform** : Windows x64

      # L’action softprops/action-gh-release utilise automatiquement GITHUB_TOKEN
