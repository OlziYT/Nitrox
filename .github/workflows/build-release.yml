name: Build and Release Nitrox

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0.x
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'    # Récupère toujours le dernier patch 9.0.* :contentReference[oaicite:2]{index=2}

      - name: Restore dependencies
        run: dotnet restore         # Séparation explicitée de la restauration :contentReference[oaicite:3]{index=3}

      - name: Clean
        run: dotnet clean --configuration Release  # Nettoyage des binaires précédents :contentReference[oaicite:4]{index=4}

      - name: Create dummy GameDir and Build
        shell: pwsh
        run: |
          # 1. Construire un chemin absolu vers un dossier SubnauticaDummy dans le workspace
          $gameDir = Join-Path $Env:GITHUB_WORKSPACE 'SubnauticaDummy'
          Write-Host "Creating GameDir at $gameDir"
          New-Item -ItemType Directory -Path $gameDir -Force | Out-Null

          # 2. Compiler en passant GameDir absolu
          dotnet build --no-restore -c Release /p:GameDir="$gameDir"  # MSBuild trouve désormais le dossier :contentReference[oaicite:5]{index=5}

      - name: Publish self-contained
        run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained true `
            -o out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nitrox-build
          path: out/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0.x
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nitrox-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nitrox ${{ github.ref_name }}
          files: out/**
          generate_release_notes: true
          body: |
            **Build**    : .NET SDK 9.0.x  
            **Date**     : ${{ github.event.head_commit.timestamp }}  
            **Platform** : Windows x64
