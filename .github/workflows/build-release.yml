name: Build and Release Nitrox

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_SDK_VERSION: 9.0.x
      # Utiliser un chemin Windows sans slash initial
      GameDir: ${{ github.runner_temp }}\\SubnauticaDummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_SDK_VERSION }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '${{ env.DOTNET_SDK_VERSION }}'

      - name: Restore dependencies
        run: dotnet restore

      - name: Clean
        run: dotnet clean --configuration Release

      - name: Create dummy GameDir
        # PowerShell sur windows-latest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ env.GameDir }}" | Out-Null

      - name: Build (Release)
        run: dotnet build --no-restore -c Release /p:GameDir="${{ env.GameDir }}"

      - name: Publish self-contained
        run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained true `
            -o out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nitrox-build
          path: out/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_SDK_VERSION }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '${{ env.DOTNET_SDK_VERSION }}'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nitrox-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nitrox ${{ github.ref_name }}
          files: out/**
          generate_release_notes: true
          body: |
            **Build** : .NET SDK ${{ env.DOTNET_SDK_VERSION }}  
            **Date**  : ${{ github.event.head_commit.timestamp }}  
            **Platform** : Windows x64
